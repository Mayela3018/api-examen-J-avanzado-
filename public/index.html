<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión PRO de Items</title>

<style>
body { font-family: 'Segoe UI'; background:#fdf6f9; margin:0; }
header { background:#f8c8dc; padding:20px; text-align:center; font-size:24px; }
.container { width:85%; margin:30px auto; }

.card {
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

input {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ddd;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn { background:#cdb4db; color:white; }
.btn-delete { background:#ff8fab; color:white; }
.btn-edit { background:#90dbf4; color:white; }

.item {
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<header>🌸 Gestión PRO de Items</header>

<div class="container">

<!-- CREAR -->
<div class="card">
    <h3>➕ Crear Item</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="descripcion" placeholder="Descripción">
    <button class="btn" onclick="crearItem()">Guardar</button>
</div>

<!-- LISTA -->
<div class="card">
    <h3>📋 Lista</h3>
    <button class="btn" onclick="cargarItems()">Actualizar</button>
    <div id="lista"></div>
</div>

<!-- USUARIOS -->
<div class="card">
    <h3>🌐 Usuarios</h3>
    <button class="btn" onclick="cargarUsuarios()">Cargar</button>
    <div id="usuarios"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:10px;">
        <h3>Editar</h3>
        <input id="editId" type="hidden">
        <input id="editNombre"><br>
        <input id="editDescripcion"><br><br>
        <button onclick="guardarEdicion()">Guardar</button>
        <button onclick="cerrarModal()">Cancelar</button>
    </div>
</div>

<script>

// ALERTAS
function mostrarMensaje(texto) {
    const div = document.createElement('div');
    div.textContent = texto;
    div.style.position="fixed";
    div.style.top="20px";
    div.style.right="20px";
    div.style.background="#4CAF50";
    div.style.color="white";
    div.style.padding="10px";
    div.style.borderRadius="8px";
    document.body.appendChild(div);

    setTimeout(()=>div.remove(),2000);
}

// ITEMS
async function cargarItems() {
    const res = await fetch('/items');
    const data = await res.json();

    const lista = document.getElementById('lista');
    lista.innerHTML='';

    data.forEach(item=>{
        lista.innerHTML+=`
        <div class="item">
            <div>${item.nombre}</div>
            <div>
                <button class="btn-edit" onclick="abrirModal(${item.id}, '${item.nombre}', '${item.descripcion}')">Editar</button>
                <button class="btn-delete" onclick="eliminarItem(${item.id})">Eliminar</button>
            </div>
        </div>`;
    });
}

async function crearItem() {
    const nombre=document.getElementById('nombre').value;
    const descripcion=document.getElementById('descripcion').value;

    await fetch('/items',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({nombre,descripcion})
    });

    mostrarMensaje("Guardado ✔");
    cargarItems();
}

async function eliminarItem(id) {
    await fetch(`/items/${id}`,{method:'DELETE'});
    mostrarMensaje("Eliminado 🗑️");
    cargarItems();
}

// MODAL
function abrirModal(id,nombre,descripcion){
    document.getElementById('modal').style.display='flex';
    document.getElementById('editId').value=id;
    document.getElementById('editNombre').value=nombre;
    document.getElementById('editDescripcion').value=descripcion;
}

function cerrarModal(){
    document.getElementById('modal').style.display='none';
}

async function guardarEdicion(){
    const id=document.getElementById('editId').value;
    const nombre=document.getElementById('editNombre').value;
    const descripcion=document.getElementById('editDescripcion').value;

    await fetch(`/items/${id}`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({nombre,descripcion})
    });

    cerrarModal();
    mostrarMensaje("Editado ✔");
    cargarItems();
}

// API EXTERNA
async function cargarUsuarios(){
    const res=await fetch('/usuarios');
    const data=await res.json();

    let html=`<table border="1" width="100%">
    <tr><th>Nombre</th><th>Email</th></tr>`;

    data.forEach(u=>{
        html+=`<tr><td>${u.nombre}</td><td>${u.email}</td></tr>`;
    });

    html+=`</table>`;
    document.getElementById('usuarios').innerHTML=html;
}

cargarItems();

</script>

</body>
</html>
